<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeliosAstro Expert</title>
  <meta name="theme-color" content="#060913">
  <link rel="manifest" href="manifest.webmanifest?v=1100">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png?v=1100">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png?v=1100">
  <link rel="stylesheet" href="assets/expert.css?v=1100">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand-box">
        <img src="assets/logo-heliosastro.png?v=1100" alt="Logo HeliosAstro" class="brand-logo">
        <div>
          <h1>HeliosAstro Expert</h1>
          <p class="subtitle">Carte premium • Ascendant • Maisons • Export PDF</p>
        </div>
      </div>

      <label>Nom
        <input type="text" id="expert-name" placeholder="Nom du consultant">
      </label>

      <label>Date
        <input type="date" id="expert-date">
      </label>

      <label>Heure locale
        <input type="time" id="expert-time" value="12:00">
      </label>

      <label>Ville
        <input type="text" id="expert-city" value="Marseille">
      </label>

      <label>Pays
        <input type="text" id="expert-country" value="France">
      </label>

      <label>Latitude
        <input type="number" id="expert-latitude" step="0.000001" value="43.2965">
      </label>

      <label>Longitude
        <input type="number" id="expert-longitude" step="0.000001" value="5.3698">
      </label>

      <label>Fuseau horaire
        <input type="text" id="expert-offset" value="+01:00">
      </label>

      <div class="button-stack">
        <button id="health-btn">Réveiller / tester le backend</button>
        <button id="generate-btn">Générer la carte</button>
        <button id="demo-btn" class="secondary">Démo Helios</button>
        <button id="save-btn" class="secondary">Sauvegarder</button>
        <button id="load-btn" class="secondary">Recharger</button>
        <button id="export-json-btn" class="secondary">Exporter JSON</button>
        <button id="export-pdf-btn">Exporter en PDF</button>
      </div>

      <div class="panel" id="status-box">Version 1100 chargée. Prêt.</div>

      <div class="panel">
        <h2>Lecture premium</h2>
        <div id="premium-summary-box"></div>
      </div>
    </aside>

    <section class="content">
      <div class="panel chart-panel">
        <div class="panel-head">
          <h2>Carte HeliosAstro</h2>
          <span class="badge" id="live-badge">MODE PRÊT</span>
        </div>

        <div class="canvas-stage">
          <div class="canvas-square">
            <canvas id="expert-canvas" width="1600" height="1600"></canvas>
          </div>
        </div>
      </div>

      <div class="grid-two">
        <div class="panel">
          <h2>Synthèse</h2>
          <div id="summary-box"></div>
        </div>

        <div class="panel">
          <h2>Aspects</h2>
          <div id="aspects-box"></div>
        </div>
      </div>

      <div class="grid-two">
        <div class="panel">
          <h2>Ascendant et MC</h2>
          <div id="angles-box"></div>
        </div>

        <div class="panel">
          <h2>Maisons</h2>
          <div id="houses-box"></div>
        </div>
      </div>

      <div class="panel">
        <h2>Positions planétaires</h2>
        <div id="planets-box"></div>
      </div>

      <div class="panel">
        <h2>Notes privées</h2>
        <textarea id="private-notes" rows="8" placeholder="Observations, axes d’interprétation..."></textarea>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="assets/expert.js?v=1100"></script>
</body>
</html>
